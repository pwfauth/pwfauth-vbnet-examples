name: build

# Build both example clients on a clean Windows runner.
# WinForms targets net8.0-windows, so this must run on Windows (not ubuntu).
#
# NOTE: auto-triggers (push / pull_request) are DISABLED for now because this
# GitHub account's Actions are billing-locked, so every run fails to *start*
# (not a code error — a clean clone builds 0/0). Re-enable them by uncommenting
# the two lines below once billing is resolved at
# https://github.com/settings/billing
on:
  workflow_dispatch:   # manual run only: Actions tab → this workflow → "Run workflow"
  # push:
  # pull_request:

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build console client
        run: dotnet build PwfAuthConsoleClient/PwfAuthConsoleClient.vbproj -c Release

      - name: Build WinForms client
        run: dotnet build PwfAuthWinFormsClient/PwfAuthWinFormsClient.vbproj -c Release

      - name: Build C# .NET Framework 4.8.1 client
        run: dotnet build PwfAuthCSharpClient/PwfAuthCSharpClient.csproj -c Release
